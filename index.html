<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry, Azhaka ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation">
        <span></span><span></span><span></span><span></span><span></span>
    </div>
    
    <div class="container" id="main-container">
        <div class="glass-card">
            <div class="icon-container">
                <div class="sad-face" id="emoji">🥺</div>
            </div>
            <h1 class="title">I'm so sorry, Azhaka.</h1>
            <p class="message" id="message">
                I messed up, and I want to make it right. You mean the world to me, and seeing you upset breaks my heart. 
                Can you please find it in your beautiful heart to forgive me?
            </p>
            
            <div class="buttons">
                <button class="btn btn-yes" id="yes-btn">Yes, I forgive you</button>
                <button class="btn btn-no" id="no-btn">No way</button>
            </div>
        </div>
    </div>

    <!-- Hidden Success Screen -->
    <div class="success-screen" id="success-screen">
        <div class="hearts-container" id="hearts-container"></div>
        <div class="success-content">
            <h1 class="success-title">Thank you, my love! ❤️</h1>
            <p class="success-message">I promise to be better. I love you so much, Azhaka!</p>
        </div>
        <div class="sorry-wall" id="sorry-wall"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
